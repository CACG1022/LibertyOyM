<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingreso - Nodo O&M</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</head>
<body>
  <div class="login-box card">
    <h1>Nodo O&M</h1>
    <p class="muted">Herramienta de control, seguimiento, inventario y gestión operativa.</p>
    <hr class="sep">
    <div class="grid grid-2">
      <div>
        <h3>Iniciar sesión</h3>
        <form id="loginForm">
          <div class="field"><label>Correo</label><input type="email" name="email" required></div>
          <div class="field"><label>Contraseña</label><input type="password" name="password" required></div>
          <button type="submit">Ingresar</button>
        </form>
      </div>
      <div>
        <h3>Crear usuario</h3>
        <form id="signupForm">
          <div class="field"><label>Nombre completo</label><input type="text" name="full_name" required></div>
          <div class="field"><label>Correo</label><input type="email" name="email" required></div>
          <div class="field"><label>Contraseña</label><input type="password" name="password" required></div>
          <button type="submit" class="secondary">Registrarme</button>
        </form>
      </div>
    </div>
    <div class="footer-note">
      Antes de usar la herramienta, abre <b>app.js</b> y reemplaza la URL y la anon key de Supabase.
    </div>
  </div>
<script>
(async ()=>{
  const client = await getClient();
  const { data } = await client.auth.getSession();
  if(data?.session?.user){ location.href = 'dashboard.html'; }
})();
document.getElementById('loginForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const data = formDataObject(e.target);
  await login(data.email, data.password);
});
document.getElementById('signupForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const data = formDataObject(e.target);
  await signup(data.email, data.password, data.full_name);
});
</script>
</body>
</html>
