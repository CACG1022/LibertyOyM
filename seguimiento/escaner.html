<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escáner de Seriales</title>

  <!-- Librería para leer códigos de barra/QR desde cámara -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --primary: #22c55e;
      --danger: #ef4444;
      --warning: #f59e0b;
      --border: #334155;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: var(--text);
      padding: 16px;
    }

    .container {
      max-width: 820px;
      margin: auto;
    }

    h1 {
      text-align: center;
      margin: 10px 0 6px;
      font-size: 26px;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      margin-bottom: 18px;
      font-size: 14px;
    }

    .card {
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 12px 30px rgba(0,0,0,.25);
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      color: #cbd5e1;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #020617;
      color: var(--text);
      font-size: 15px;
      margin-bottom: 12px;
    }

    #reader {
      width: 100%;
      background: #020617;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      margin-top: 10px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 12px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-weight: bold;
      cursor: pointer;
      color: white;
      font-size: 14px;
    }

    .btn-primary { background: var(--primary); color: #052e16; }
    .btn-secondary { background: #2563eb; }
    .btn-warning { background: var(--warning); color: #451a03; }
    .btn-danger { background: var(--danger); }
    .btn-gray { background: #475569; }

    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }

    .status {
      margin-top: 12px;
      padding: 10px;
      border-radius: 10px;
      background: #020617;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 14px;
    }

    .kpis {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }

    .kpi {
      background: #020617;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }

    .kpi .num {
      font-size: 24px;
      font-weight: bold;
      color: var(--primary);
    }

    .kpi .txt {
      font-size: 12px;
      color: var(--muted);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 12px;
      font-size: 14px;
    }

    th, td {
      border-bottom: 1px solid var(--border);
      padding: 10px;
      text-align: left;
    }

    th {
      background: #020617;
      color: #cbd5e1;
      position: sticky;
      top: 0;
    }

    tr:hover {
      background: rgba(148, 163, 184, .08);
    }

    .table-wrap {
      max-height: 360px;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    .serial {
      font-family: Consolas, monospace;
      font-weight: bold;
    }

    .delete-row {
      background: transparent;
      color: #f87171;
      padding: 4px 8px;
      border: 1px solid #7f1d1d;
    }

    .manual-row {
      display: flex;
      gap: 8px;
    }

    .manual-row input {
      margin-bottom: 0;
    }

    @media (max-width: 640px) {
      body {
        padding: 10px;
      }

      h1 {
        font-size: 22px;
      }

      .buttons {
        grid-template-columns: 1fr;
      }

      .kpis {
        grid-template-columns: 1fr;
      }

      th, td {
        font-size: 12px;
        padding: 8px;
      }

      .manual-row {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Escáner de Seriales</h1>
    <div class="subtitle">Escanea códigos de barra desde el celular y genera un reporte al final.</div>

    <div class="card">
      <label for="proyecto">Proyecto / Cliente</label>
      <input id="proyecto" placeholder="Ej: Telefónica / Movistar" />

      <label for="responsable">Responsable</label>
      <input id="responsable" placeholder="Ej: Camilo Carreño" />

      <div id="reader"></div>

      <div class="buttons">
        <button class="btn-primary" id="btnStart">Iniciar cámara</button>
        <button class="btn-danger" id="btnStop" disabled>Detener cámara</button>
      </div>

      <div class="status" id="status">Estado: cámara detenida.</div>
    </div>

    <div class="card">
      <label>Agregar serial manualmente</label>
      <div class="manual-row">
        <input id="manualSerial" placeholder="Digite o pegue un serial" />
        <button class="btn-secondary" id="btnAddManual">Agregar</button>
      </div>
    </div>

    <div class="card">
      <div class="kpis">
        <div class="kpi">
          <div class="num" id="totalSeriales">0</div>
          <div class="txt">Seriales únicos</div>
        </div>
        <div class="kpi">
          <div class="num" id="duplicados">0</div>
          <div class="txt">Duplicados detectados</div>
        </div>
        <div class="kpi">
          <div class="num" id="ultimoSerial">-</div>
          <div class="txt">Último serial</div>
        </div>
      </div>

      <div class="buttons">
        <button class="btn-secondary" id="btnCSV">Exportar CSV / Excel</button>
        <button class="btn-warning" id="btnTXT">Exportar TXT</button>
        <button class="btn-gray" id="btnCopy">Copiar listado</button>
        <button class="btn-danger" id="btnClear">Limpiar todo</button>
      </div>
    </div>

    <div class="card">
      <h3>Listado de seriales escaneados</h3>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Serial</th>
              <th>Fecha y hora</th>
              <th>Acción</th>
            </tr>
          </thead>
          <tbody id="tablaSeriales"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let html5QrCode = null;
    let scanning = false;
    let seriales = JSON.parse(localStorage.getItem("serialesEscaneados") || "[]");
    let duplicados = Number(localStorage.getItem("serialesDuplicados") || "0");
    let lastScan = "";
    let bloqueoLectura = false;

    let audioCtx = null;

    function reproducirBeep() {
      try {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.type = "sine";
        oscillator.frequency.setValueAtTime(1200, audioCtx.currentTime);

        gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.2);

      } catch (e) {
        console.log("No se pudo reproducir sonido", e);
      }
    }


    const statusEl = document.getElementById("status");
    const tabla = document.getElementById("tablaSeriales");

    function normalizarSerial(valor) {
      return String(valor || "").trim();
    }

    function fechaActual() {
      return new Date().toLocaleString("es-CO", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });
    }

    function guardarLocal() {
      localStorage.setItem("serialesEscaneados", JSON.stringify(seriales));
      localStorage.setItem("serialesDuplicados", String(duplicados));
    }

    function agregarSerial(valor) {
      const serial = normalizarSerial(valor);

      if (!serial) return;

      const existe = seriales.some(item => item.serial.toLowerCase() === serial.toLowerCase());

      if (existe) {
        duplicados++;
        guardarLocal();
        render();
        statusEl.textContent = "Serial duplicado detectado: " + serial;
        statusEl.style.color = "#fbbf24";
        vibrar([100, 80, 100]);
        return;
      }

      seriales.push({
        serial: serial,
        fecha: fechaActual()
      });

      lastScan = serial;
      guardarLocal();
      render();

      statusEl.textContent = "Serial agregado: " + serial;
      statusEl.style.color = "#22c55e";
      vibrar(120);
      reproducirBeep();
    }

    function vibrar(pattern) {
      if (navigator.vibrate) {
        navigator.vibrate(pattern);
      }
    }

    function render() {
      document.getElementById("totalSeriales").textContent = seriales.length;
      document.getElementById("duplicados").textContent = duplicados;
      document.getElementById("ultimoSerial").textContent = seriales.length ? seriales[seriales.length - 1].serial : "-";

      tabla.innerHTML = "";

      seriales.forEach((item, index) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${index + 1}</td>
          <td class="serial">${escapeHtml(item.serial)}</td>
          <td>${escapeHtml(item.fecha)}</td>
          <td><button class="delete-row" onclick="eliminarSerial(${index})">Eliminar</button></td>
        `;
        tabla.appendChild(tr);
      });
    }

    function eliminarSerial(index) {
      if (!confirm("¿Deseas eliminar este serial?")) return;
      seriales.splice(index, 1);
      guardarLocal();
      render();
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function iniciarCamara() {
      if (scanning) return;

      html5QrCode = new Html5Qrcode("reader");

      const config = {
        fps: 10,
        qrbox: { width: 280, height: 160 },
        formatsToSupport: [
          Html5QrcodeSupportedFormats.CODE_128,
          Html5QrcodeSupportedFormats.CODE_39,
          Html5QrcodeSupportedFormats.EAN_13,
          Html5QrcodeSupportedFormats.EAN_8,
          Html5QrcodeSupportedFormats.UPC_A,
          Html5QrcodeSupportedFormats.UPC_E,
          Html5QrcodeSupportedFormats.ITF,
          Html5QrcodeSupportedFormats.CODABAR,
          Html5QrcodeSupportedFormats.QR_CODE
        ]
      };

      try {
        await html5QrCode.start(
          { facingMode: "environment" },
          config,
          (decodedText) => {
            if (bloqueoLectura) return;

            bloqueoLectura = true;
            agregarSerial(decodedText);

            setTimeout(() => {
              bloqueoLectura = false;
            }, 1200);
          },
          () => {}
        );

        scanning = true;
        document.getElementById("btnStart").disabled = true;
        document.getElementById("btnStop").disabled = false;
        statusEl.textContent = "Estado: cámara activa. Apunta al código de barras.";
        statusEl.style.color = "#94a3b8";

      } catch (err) {
        statusEl.textContent = "Error al iniciar cámara: " + err;
        statusEl.style.color = "#f87171";
      }
    }

    async function detenerCamara() {
      if (!html5QrCode || !scanning) return;

      try {
        await html5QrCode.stop();
        await html5QrCode.clear();

        scanning = false;
        document.getElementById("btnStart").disabled = false;
        document.getElementById("btnStop").disabled = true;
        statusEl.textContent = "Estado: cámara detenida.";
        statusEl.style.color = "#94a3b8";

      } catch (err) {
        statusEl.textContent = "Error al detener cámara: " + err;
        statusEl.style.color = "#f87171";
      }
    }

    function nombreArchivo(extension) {
      const proyecto = document.getElementById("proyecto").value.trim() || "reporte_seriales";
      const limpio = proyecto.replace(/[^a-zA-Z0-9_-]/g, "_");
      const fecha = new Date().toISOString().slice(0, 10);
      return `${limpio}_${fecha}.${extension}`;
    }

    function exportarCSV() {
      const proyecto = document.getElementById("proyecto").value.trim();
      const responsable = document.getElementById("responsable").value.trim();

      let csv = "Proyecto,Responsable,Item,Serial,Fecha y hora\n";

      seriales.forEach((item, index) => {
        csv += `"${proyecto}","${responsable}","${index + 1}","${item.serial}","${item.fecha}"\n`;
      });

      descargarArchivo(csv, nombreArchivo("csv"), "text/csv;charset=utf-8;");
    }

    function exportarTXT() {
      const proyecto = document.getElementById("proyecto").value.trim();
      const responsable = document.getElementById("responsable").value.trim();

      let txt = "";
      txt += "REPORTE DE SERIALES ESCANEADOS\n";
      txt += "Proyecto / Cliente: " + proyecto + "\n";
      txt += "Responsable: " + responsable + "\n";
      txt += "Fecha reporte: " + fechaActual() + "\n";
      txt += "Total seriales únicos: " + seriales.length + "\n";
      txt += "Duplicados detectados: " + duplicados + "\n";
      txt += "--------------------------------------\n\n";

      seriales.forEach((item, index) => {
        txt += `${index + 1}. ${item.serial} - ${item.fecha}\n`;
      });

      descargarArchivo(txt, nombreArchivo("txt"), "text/plain;charset=utf-8;");
    }

    function descargarArchivo(contenido, nombre, tipo) {
      const blob = new Blob([contenido], { type: tipo });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = nombre;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    async function copiarListado() {
      const texto = seriales.map((item, i) => `${i + 1}. ${item.serial}`).join("\n");

      if (!texto) {
        alert("No hay seriales para copiar.");
        return;
      }

      try {
        await navigator.clipboard.writeText(texto);
        alert("Listado copiado al portapapeles.");
      } catch {
        alert("No se pudo copiar automáticamente. Exporta el TXT.");
      }
    }

    function limpiarTodo() {
      if (!confirm("¿Seguro que deseas borrar todos los seriales escaneados?")) return;

      seriales = [];
      duplicados = 0;
      lastScan = "";
      guardarLocal();
      render();

      statusEl.textContent = "Listado limpiado.";
      statusEl.style.color = "#94a3b8";
    }

    document.getElementById("btnStart").addEventListener("click", iniciarCamara);
    document.getElementById("btnStop").addEventListener("click", detenerCamara);
    document.getElementById("btnCSV").addEventListener("click", exportarCSV);
    document.getElementById("btnTXT").addEventListener("click", exportarTXT);
    document.getElementById("btnCopy").addEventListener("click", copiarListado);
    document.getElementById("btnClear").addEventListener("click", limpiarTodo);

    document.getElementById("btnAddManual").addEventListener("click", () => {
      const input = document.getElementById("manualSerial");
      agregarSerial(input.value);
      input.value = "";
      input.focus();
    });

    document.getElementById("manualSerial").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        document.getElementById("btnAddManual").click();
      }
    });

    render();
  </script>
</body>
</html>
