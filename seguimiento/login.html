<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingreso - Nodo O&M</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
  <style>
    .login-actions{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-top:14px}
    .link-btn{display:inline-flex;align-items:center;justify-content:center;text-decoration:none;border-radius:12px;padding:12px 16px;font-weight:700;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.10);color:#fff}
    .link-btn:hover{filter:brightness(1.12)}
    .login-box.single{max-width:520px;margin:7vh auto}
  </style>
</head>
<body>
  <div class="login-box card single">
    <h1>Nodo O&M</h1>
    <p class="muted">Herramienta de control, seguimiento, inventario y gestión operativa.</p>
    <hr class="sep">

    <h3>Iniciar sesión</h3>
    <form id="loginForm">
      <div class="field"><label>Correo</label><input type="email" name="email" autocomplete="email" required></div>
      <div class="field"><label>Contraseña</label><input type="password" name="password" autocomplete="current-password" required></div>
      <div class="login-actions">
        <button type="submit">Ingresar</button>
        <a class="link-btn" href="crear-usuario.html">Crear usuario</a>
      </div>
    </form>

    <div class="footer-note">
      ¿No tienes usuario? Ingresa a <b>Crear usuario</b> para registrarte.
    </div>
  </div>
<script>
(async ()=>{
  const client = await getClient();
  const { data } = await client.auth.getSession();
  if(data?.session?.user){ location.href = 'dashboard.html'; }
})();
document.getElementById('loginForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const data = formDataObject(e.target);
  await login(data.email, data.password);
});
</script>
</body>
</html>
