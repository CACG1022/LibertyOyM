<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tickets y fallas</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
  <style>
    :root{--border:rgba(255,255,255,.10);--text:#eef4ff;--muted:#9ab0d0;--shadow:0 18px 40px rgba(0,0,0,.28)}
    *{box-sizing:border-box}
    body{margin:0;background:linear-gradient(180deg,#04101f,#07152a);color:var(--text);font-family:Arial,Helvetica,sans-serif}
    .page{display:grid;grid-template-columns:240px 1fr;min-height:100vh;transition:grid-template-columns .25s ease}
    .sidebar{background:linear-gradient(180deg,#08142a,#081126);border-right:1px solid var(--border);padding:18px 16px;position:sticky;top:0;height:100vh;transition:transform .25s ease, opacity .25s ease, width .25s ease;overflow:hidden}
    .brand{font-size:18px;font-weight:800;margin-bottom:4px}.subbrand{font-size:12px;color:var(--muted);margin-bottom:24px}
    .nav a{display:block;padding:12px;border-radius:12px;color:#fff;text-decoration:none;margin-bottom:8px;border:1px solid transparent}
    .nav a:hover,.nav a.active{background:rgba(255,255,255,.05);border-color:var(--border)}
    .session-box{margin-top:24px;padding:14px;border:1px solid var(--border);border-radius:16px;background:rgba(255,255,255,.03)}
    .session-box small{display:block;color:var(--muted);margin-bottom:8px;word-break:break-all}
    .btn{border:none;border-radius:12px;padding:12px 16px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#2563eb,#22c55e);color:#fff}
    .btn.secondary{background:#1f3d79}.btn.ghost{background:rgba(255,255,255,.04);border:1px solid var(--border)}
    .main{padding:26px 28px}
    .header h1{margin:0 0 6px;font-size:28px}.header p{margin:0 0 20px;color:var(--muted)}
    .toolbar-row{display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-bottom:18px}
    .toolbar-left,.toolbar-right{display:flex;gap:12px;flex-wrap:wrap}
    .control{min-width:190px;padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:#0c1830;color:#fff}
    .summary{display:grid;grid-template-columns:repeat(6,minmax(150px,1fr));gap:12px;margin-bottom:18px}
    .stat{border:1px solid var(--border);border-radius:18px;background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));padding:16px;box-shadow:var(--shadow);min-height:108px}
    .stat .label{font-size:12px;color:var(--muted);margin-bottom:8px}.stat .value{font-size:30px;font-weight:800}.stat .sub{font-size:12px;color:#b9d6ff;margin-top:6px}
    .card{border:1px solid var(--border);border-radius:20px;background:linear-gradient(180deg,#08152c,#0a1730);box-shadow:var(--shadow)}
    .table-wrap{overflow:auto} table{width:100%;border-collapse:separate;border-spacing:0}
    thead th{position:sticky;top:0;background:#0a1730;color:#9fd0ff;padding:14px 12px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
    tbody td{padding:14px 12px;border-bottom:1px solid rgba(255,255,255,.06);vertical-align:top}
    tr:hover{background:rgba(255,255,255,.03)} tr.completed{background:linear-gradient(90deg, rgba(20,120,55,.38), rgba(34,197,94,.12))}
    .title{font-weight:700;margin-bottom:4px}.desc{font-size:12px;color:var(--muted);max-width:360px;white-space:pre-wrap}
    .badge{display:inline-flex;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:700;border:1px solid var(--border)}
    .priority-CRITICA{background:rgba(239,68,68,.15);color:#fecaca}.priority-ALTA{background:rgba(245,158,11,.16);color:#fde68a}.priority-MEDIA{background:rgba(59,130,246,.16);color:#bfdbfe}.priority-BAJA{background:rgba(148,163,184,.16);color:#e2e8f0}
    .status-ABIERTO{background:rgba(59,130,246,.16);color:#bfdbfe}.status-EN_GESTION{background:rgba(245,158,11,.16);color:#fde68a}.status-ESCALADO{background:rgba(239,68,68,.16);color:#fecaca}.status-CERRADO{background:rgba(34,197,94,.16);color:#bbf7d0}
    .select-status{min-width:155px;padding:8px 10px;border-radius:10px;border:1px solid var(--border);background:#091326;color:#fff}
    .actions{display:flex;gap:8px;flex-wrap:nowrap;align-items:center}.small-btn{padding:8px 12px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:#fff;cursor:pointer}
    .small-btn.danger{color:#fecaca}.small-btn.info{color:#bfdbfe}.small-btn.whatsapp{color:#86efac}
    .empty{padding:26px;text-align:center;color:var(--muted);display:none}
    .floating-add{position:fixed;right:28px;bottom:28px;width:62px;height:62px;border-radius:50%;border:none;font-size:34px;font-weight:700;cursor:pointer;color:#fff;background:linear-gradient(135deg,#2563eb,#22c55e);box-shadow:var(--shadow);z-index:40}
    .sidebar-toggle{
      position:fixed;
      top:50vh;
      z-index:80;
      border:none;
      border-radius:10px;
      width:28px;
      height:44px;
      padding:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(12,24,48,.96);
      color:#fff;
      cursor:pointer;
      box-shadow:var(--shadow);
      transition:left .25s ease, transform .25s ease;
      line-height:1;
      font-size:18px;
}
body:not(.sidebar-hidden) .sidebar-toggle{
      left:246px;
      transform:translate(-50%, -50%);
}
body.sidebar-hidden .sidebar-toggle{
      left:8px;
      transform:translateY(-50%);
}
    body.sidebar-hidden .page{grid-template-columns:0 1fr}
    body.sidebar-hidden .sidebar{transform:translateX(-100%);opacity:0;pointer-events:none;width:0;padding-left:0;padding-right:0;border-right:none}
    body.sidebar-hidden .sidebar-toggle{left:16px}
    .main{transition:margin .25s ease}

    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:60;padding:20px}
    .modal-backdrop.show{display:flex}
    .modal{width:min(1180px,100%);max-height:94vh;overflow:auto;background:linear-gradient(180deg,#08152c,#0a1730);border:1px solid var(--border);border-radius:22px;box-shadow:var(--shadow);padding:22px}
    .modal.small{width:min(920px,100%)} .modal-header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:16px}
    .close-btn{width:40px;height:40px;border:none;border-radius:12px;background:rgba(255,255,255,.05);color:#fff;cursor:pointer}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.field{margin-bottom:8px}.field label{display:block;margin-bottom:6px;font-size:13px;color:#cfe0ff}
    .field input,.field select,.field textarea{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:#0c1830;color:#fff}.field input:invalid{border-color:rgba(239,68,68,.75)}.field textarea{min-height:100px;resize:vertical}.help{display:block;margin-top:6px;font-size:12px;color:var(--muted);line-height:1.35}
    .span-2{grid-column:span 2}.span-4{grid-column:1/-1}.footer-note{margin-top:10px;font-size:13px;color:#86efac}.muted-note{font-size:12px;color:var(--muted)}
    .timeline{display:grid;gap:12px}.timeline-item{border:1px solid var(--border);border-radius:14px;padding:14px;background:rgba(255,255,255,.03)}
    .timeline-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}.timeline-title{font-weight:700}.timeline-date{font-size:12px;color:#b9d6ff}
    .timeline-detail{font-size:13px;color:#dce7f8;margin-top:8px;white-space:pre-wrap}.timeline-meta{font-size:12px;color:var(--muted);margin-top:6px}
    @media (max-width:1400px){.summary{grid-template-columns:repeat(3,minmax(150px,1fr))}}
    @media (max-width:1250px){.grid{grid-template-columns:repeat(2,1fr)}}
    @media (max-width:900px){.page{grid-template-columns:1fr}.sidebar{position:relative;height:auto}.grid,.summary{grid-template-columns:1fr}}
  </style>
</head>
<body>
<button id="sidebarToggle" class="sidebar-toggle" type="button" onclick="toggleSidebar()">☰</button>
<div id="root"></div>

<div id="ticketModal" class="modal-backdrop">
  <div class="modal">
    <div class="modal-header">
      <div>
        <h3 id="modalTitle" style="margin:0 0 6px 0;">Nueva falla / ticket</h3>
        <div class="muted-note">Registra inicio, cierre, causa, solución, datos técnicos y ubicación.</div>
      </div>
      <button class="close-btn" type="button" onclick="closeTicketModal()">✕</button>
    </div>
    <form id="ticketForm" action="javascript:void(0);" method="post">
      <input type="hidden" name="id">
      <div class="grid">
        <div class="field"><label>Fecha inicio</label><input type="date" name="fecha_inicio" required></div>
        <div class="field"><label>Hora inicio</label><input type="time" name="hora_inicio" required></div>
        <div class="field"><label>Ticket</label><input name="ticket" required></div>
        <div class="field"><label>ID del cliente</label><input name="id_cliente"></div>
        <div class="field span-2"><label>Nombre cliente</label><input name="nombre_cliente" required></div>
        <div class="field span-2"><label>Dirección cliente</label><input name="direccion_cliente"></div>
        <div class="field span-2"><label>Coordenada cliente</label><input name="coordenada_cliente"></div>
        <div class="field"><label>Demónico</label><input name="demonico"></div>
        <div class="field"><label>Equipo / Switch</label><input name="equipo_switch"></div>
        <div class="field"><label>Puerto switch</label><input name="puerto_switch"></div>
        <div class="field"><label>ODF espejo</label><input name="odf_espejo"></div>
        <div class="field"><label>ODF salida</label><input name="odf_salida"></div>
        <div class="field"><label>Puerto ODF salida</label><input name="puerto_odf_salida"></div>
        <div class="field"><label>Responsable</label><input name="responsable"></div>
        <div class="field"><label>Estado</label><select name="estado"><option>ABIERTO</option><option>EN_GESTION</option><option>ESCALADO</option><option>CERRADO</option></select></div>
        <div class="field"><label>Prioridad</label><select name="prioridad"><option>MEDIA</option><option>BAJA</option><option>ALTA</option><option>CRITICA</option></select></div>
        <div class="field"><label>Tipo de falla</label><select name="tipo_falla" id="tipoFallaSelect"><option value="">Seleccione...</option></select></div>
        <div class="field"><label>Subcausa / subcategoría</label><select name="subcausa_falla" id="subcausaFallaSelect"><option value="">Seleccione primero el tipo</option></select></div>
        <div class="field"><label>Fecha fin</label><input type="date" name="fecha_fin"></div>
        <div class="field"><label>Hora fin</label><input type="time" name="hora_fin"></div>
        <div class="field"><label>Duración falla</label><input name="duracion_falla" readonly></div>
        <div class="field"><label>Coord falla / daño <span style="color:#fecaca">*</span></label><input name="coord_dano" id="coordDanoInput" required placeholder="Ej: 4.127203, -73.620803" autocomplete="off" title="Ingrese latitud y longitud en formato decimal: 4.127203, -73.620803"><small class="help">Formato estándar para mapa: latitud, longitud. Ejemplo: 4.127203, -73.620803</small></div>
        <div class="field span-2"><label>Causa</label><textarea name="causa"></textarea></div>
        <div class="field span-2"><label>Solución</label><textarea name="solucion"></textarea></div>
        <div class="field span-4"><label>Observación</label><textarea name="observacion"></textarea></div>
      </div>
      <div class="actions" style="justify-content:flex-end;margin-top:10px">
        <button type="button" class="small-btn" onclick="closeTicketModal()">Cancelar</button>
        <button type="submit" class="btn" id="saveBtn">Guardar ticket</button>
      </div>
      <div id="ticketMsg" class="footer-note"></div>
    </form>
  </div>
</div>

<div id="historyModal" class="modal-backdrop">
  <div class="modal small">
    <div class="modal-header">
      <div>
        <h3 id="historyTitle" style="margin:0 0 6px 0;">Historial del ticket</h3>
        <div class="muted-note">Cambios, estados y eventos del ticket.</div>
      </div>
      <button class="close-btn" type="button" onclick="closeHistoryModal()">✕</button>
    </div>
    <div id="historyContent" class="timeline"></div>
  </div>
</div>

  document.getElementById('root').innerHTML = `

        <div class="header"><h1>Tickets y fallas</h1><p>Registro operativo de incidentes, causa, solución, tiempos de falla y trazabilidad técnica.</p></div>
        <div class="toolbar-row">
          <div class="toolbar-left">
            <input id="searchTicket" class="control" placeholder="Buscar por ticket, cliente, ID cliente, equipo o responsable">
            <select id="filterEstado" class="control"><option value="">Todos los estados</option><option>ABIERTO</option><option>EN_GESTION</option><option>ESCALADO</option><option>CERRADO</option></select>
            <select id="filterPrioridad" class="control"><option value="">Todas las prioridades</option><option>CRITICA</option><option>ALTA</option><option>MEDIA</option><option>BAJA</option></select>
          </div>

            <select id="sortBy" class="control"><option value="fecha_inicio_desc">Más recientes</option><option value="prioridad_desc">Prioridad alta primero</option><option value="prioridad_asc">Prioridad baja primero</option><option value="duracion_desc">Mayor duración</option><option value="ticket_asc">Ticket A-Z</option><option value="estado_asc">Estado</option></select>
            <button class="btn ghost" onclick="loadTickets()">Actualizar</button>
          </div>
        </div>
        <div id="ticketSummary" class="summary"></div>
        <div class="card"><div class="table-wrap"><table><thead><tr><th>Fecha / Hora</th><th>Ticket</th><th>ID cliente</th><th>Cliente</th><th>Equipo</th><th>Puerto</th><th>Responsable</th><th>Estado</th><th>Prioridad</th><th>Duración</th><th>Tipo de falla</th><th>Subcausa</th><th>Coord falla</th><th>Acciones</th></tr></thead><tbody id="ticketsTableBody"></tbody></table></div><div id="ticketEmpty" class="empty">No hay tickets para mostrar.</div></div>
        <button class="floating-add" title="Nuevo ticket" onclick="openTicketModal()">+</button>
      </main>
    </div>`;
}
function safeLogout(){ try{ if(typeof logout==='function'){ logout(); return; } }catch(e){} localStorage.removeItem('user_email'); location.href='index.html'; }
function applySidebarState(){
  const hidden = localStorage.getItem('fallas_sidebar_hidden') === '1';
  document.body.classList.toggle('sidebar-hidden', hidden);
}
function toggleSidebar(){
  const hidden = !(localStorage.getItem('fallas_sidebar_hidden') === '1');
  localStorage.setItem('fallas_sidebar_hidden', hidden ? '1' : '0');
  applySidebarState();
}
renderShell();
applySidebarState();

function normalizarCoordenadaFalla(valor){
  const raw = String(valor || '').trim();
  if(!raw) return { ok:false, value:'', error:'La coordenada de la falla es obligatoria.' };

  // Acepta formatos comunes:
  // 4.127203, -73.620803 | 4.127203 -73.620803 | Lat: 4.127203 Lon: -73.620803
  // También intenta corregir casos con coma decimal: 4,127203 -73,620803
  let text = raw
    .replace(/[°º]/g, ' ')
    .replace(/latitud|latitude|lat\.?|longitud|longitude|lon\.?|lng\.?/gi, ' ')
    .replace(/[;]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();

  let nums = text.match(/[-+]?\d+(?:[\.,]\d+)?/g) || [];

  // Si el usuario escribió "4,127203, -73,620803", se reconstruye como dos números decimales.
  if(nums.length > 2){
    const rebuilt = [];
    for(let i=0; i<nums.length; i++){
      const cur = nums[i];
      const next = nums[i+1];
      if(/^[-+]?\d+$/.test(cur) && next && /^\d{3,}$/.test(next)){
        rebuilt.push(cur + '.' + next);
        i++;
      }else{
        rebuilt.push(cur);
      }
    }
    nums = rebuilt;
  }

  if(nums.length < 2){
    return { ok:false, value:raw, error:'Formato inválido. Use latitud, longitud. Ejemplo: 4.127203, -73.620803' };
  }

  const lat = Number(String(nums[0]).replace(',', '.'));
  const lng = Number(String(nums[1]).replace(',', '.'));

  if(!Number.isFinite(lat) || !Number.isFinite(lng)){
    return { ok:false, value:raw, error:'La coordenada contiene valores no numéricos.' };
  }
  if(lat < -90 || lat > 90 || lng < -180 || lng > 180){
    return { ok:false, value:raw, error:'La latitud debe estar entre -90 y 90, y la longitud entre -180 y 180.' };
  }

  return { ok:true, lat, lng, value:`${lat.toFixed(6)}, ${lng.toFixed(6)}` };
}

function validarYNormalizarCoordFalla(input, mostrarAlerta=false){
  if(!input) return true;
  const res = normalizarCoordenadaFalla(input.value);
  if(res.ok){
    input.value = res.value;
    input.setCustomValidity('');
    return true;
  }
  input.setCustomValidity(res.error);
  if(mostrarAlerta){
    input.reportValidity();
  }
  return false;
}

async function copyToClipboardText(text){
  try{
    if(navigator.clipboard && window.isSecureContext){
      await navigator.clipboard.writeText(text);
      return true;
    }
  }catch(e){}
  try{
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    return ok;
  }catch(e){
    return false;
  }
}

        fecha: x.fecha_evento,
        titulo: `Auditoría: ${x.accion || 'Evento'}`,
        detalle: x.detalle || '',
        meta: x.usuario_email || 'Usuario desconocido'
      }));
    }
  }catch(e){
    console.warn('Sin tabla de auditoría o sin datos', e);
  }

  events.sort((a,b) => String(b.fecha || '').localeCompare(String(a.fecha || '')));

  if(!events.length){
    container.innerHTML = '<div class="timeline-item"><div class="timeline-title">Sin historial disponible</div><div class="timeline-detail">Aún no se encontraron cambios registrados para este ticket.</div></div>';
    return;
  }

  container.innerHTML = events.map(ev => `
    <div class="timeline-item">
      <div class="timeline-top">
        <div class="timeline-title">${esc(ev.titulo)}</div>
        <div class="timeline-date">${esc(new Date(ev.fecha).toLocaleString('es-CO'))}</div>
      </div>
      <div class="timeline-detail">${esc(ev.detalle)}</div>
      <div class="timeline-meta">${esc(ev.meta)}</div>
    </div>
  `).join('');
};

['searchTicket','filterEstado','filterPrioridad','sortBy'].forEach(id=>{ const el=document.getElementById(id); if(el){ el.addEventListener('input',renderTickets); el.addEventListener('change',renderTickets); } });
loadTickets();
</script>
</body>
</html>
