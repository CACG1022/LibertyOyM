<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Enrutamiento OYM Offline</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial;background:#020617;color:#e5e7eb;overflow:hidden}header{position:fixed;top:0;left:0;right:0;height:54px;background:rgba(2,6,23,.92);z-index:900;border-bottom:1px solid #334155;display:flex;align-items:center;justify-content:space-between;padding:8px 12px}h1{font-size:15px;margin:0}.small{font-size:12px;color:#9ca3af}.mapWrap{position:fixed;inset:54px 0 0 0}#map{height:100%;width:100%}.cross{position:absolute;left:50%;top:50%;width:68px;height:68px;transform:translate(-50%,-50%);z-index:700;pointer-events:none}.cross:before,.cross:after{content:"";position:absolute;background:#ef4444;box-shadow:0 0 5px #fff}.cross:before{left:50%;top:0;width:3px;height:68px}.cross:after{top:50%;left:0;height:3px;width:68px}.circle{position:absolute;inset:12px;border:3px solid #ef4444;border-radius:50%;box-shadow:0 0 5px #fff}.buttonsMap{position:absolute;right:10px;top:70px;z-index:800;display:flex;flex-direction:column;gap:8px;width:150px}.bottom{position:absolute;left:10px;bottom:88px;z-index:800;display:flex;flex-direction:column;gap:8px;width:160px}.centerInfo{position:absolute;left:50%;bottom:16px;transform:translateX(-50%);z-index:800;background:rgba(2,6,23,.92);border:1px solid #475569;border-radius:12px;padding:9px;width:min(460px,calc(100% - 20px));font-size:12px;text-align:center}button{border:0;border-radius:12px;padding:10px;font-weight:700;background:#22c55e;color:#020617;box-shadow:0 8px 20px rgba(0,0,0,.3)}button.blue{background:#38bdf8}button.orange{background:#f59e0b}button.red{background:#ef4444;color:white}button.gray{background:#64748b;color:white}button.purple{background:#7c3aed;color:white}.overlay{display:none;position:fixed;inset:0;background:rgba(2,6,23,.84);z-index:9999;overflow:auto;padding:12px}.modal{background:#111827;border:1px solid #475569;border-radius:16px;width:min(980px,100%);margin:12px auto;overflow:hidden}.head{position:sticky;top:0;background:#020617;border-bottom:1px solid #334155;padding:12px;display:flex;justify-content:space-between;align-items:center;z-index:2}.head h2{margin:0;font-size:16px}.body{padding:14px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}label{font-size:12px;color:#9ca3af;margin:9px 0 4px;display:block}input,select,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid #475569;background:#020617;color:#e5e7eb}textarea{min-height:65px}.section{margin:16px 0 8px;color:#93c5fd;border-bottom:1px solid #334155;padding-bottom:5px;font-weight:700;font-size:14px}.hidden{display:none}.gpsBox,.item{background:#020617;border:1px dashed #475569;border-radius:12px;padding:10px;font-size:13px;color:#cbd5e1;margin-bottom:10px}.item{border-style:solid}.photoGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.photoCard{background:#020617;border:1px solid #334155;border-radius:12px;padding:10px}.preview{width:100%;max-height:240px;object-fit:cover;border-radius:10px;margin-top:8px;display:none}.mini{width:49%;max-height:120px;object-fit:cover;border-radius:8px}.badge{display:inline-block;padding:4px 8px;border-radius:999px;font-size:11px;font-weight:700;margin:2px}.pendiente{background:#f59e0b;color:#111827}.enviado{background:#16a34a}.error{background:#dc2626}.interno{background:#7c3aed}.externo{background:#0284c7}.gpsPulse{width:18px;height:18px;background:#38bdf8;border:3px solid white;border-radius:50%;animation:pulse 1.7s infinite}@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(56,189,248,.8)}70%{box-shadow:0 0 0 18px rgba(56,189,248,0)}100%{box-shadow:0 0 0 0 rgba(56,189,248,0)}}@media(max-width:720px){.row,.photoGrid{grid-template-columns:1fr}.buttonsMap{width:135px}.bottom{width:145px}.mini{width:100%}}
</style>
</head>
<body>
<header><div><h1>Enrutamiento OYM</h1><div class="small">Offline + envío manual a Supabase</div></div><div id="status" class="small">Pendientes: 0</div></header>
<section class="mapWrap"><div id="map"></div><div class="cross"><div class="circle"></div></div><div class="buttonsMap"><button class="blue" onclick="iniciarGPS()">Ir a mi GPS</button><button onclick="marcarCentro()">Marcar</button><button class="gray" onclick="abrirRegistros()">Registros</button><button class="orange" onclick="sincronizar()">Enviar datos</button></div><div class="bottom"><button class="orange" onclick="seguir=true">Seguir GPS</button><button class="purple" onclick="seguir=false">No seguir</button></div><div class="centerInfo" id="centerInfo"></div></section>

<div class="overlay" id="formOverlay"><div class="modal"><div class="head"><h2>Registrar empalme</h2><button class="red" onclick="cerrarForm()">Cerrar</button></div><div class="body">
<div class="gpsBox" id="gpsForm"></div>
<div class="section">1. Clasificación</div><div class="row"><div><label>Tipo de enrutamiento *</label><select id="ambiente" onchange="ambienteChange()"><option value="">Seleccione</option><option value="externo">Externo</option><option value="interno">Interno</option></select></div><div><label>Tipo de punto</label><select id="tipo_punto"><option>Empalme</option><option>Caja de empalme</option><option>Manga</option><option>ODF</option><option>Reserva</option><option>Nodo</option><option>Cliente</option><option>Gabinete</option><option>FDH/FDT</option></select></div></div>
<div id="internoBox" class="hidden"><div class="section">2. Ubicación interna</div><div class="row"><div><label>Zona interna</label><select id="zona_interna"><option></option><option>Sótano</option><option>Semisótano</option><option>Parqueadero</option><option>Cuarto técnico</option><option>Cuarto de telecomunicaciones</option><option>Cuarto eléctrico</option><option>Rack</option><option>Shut de comunicaciones</option><option>Escalera</option><option>Pasillo</option><option>Terraza</option><option>Azotea</option><option>Fachada interna</option><option>Patio interno</option><option>Local comercial</option><option>Oficina</option><option>Apartamento</option><option>Otro</option></select></div><div><label>Piso / nivel</label><input id="piso_nivel"></div></div><div class="row"><div><label>Torre / bloque</label><input id="torre_bloque"></div><div><label>Cuarto / rack</label><input id="cuarto_rack"></div></div><div class="row"><div><label>Referencia visual</label><input id="referencia_visual"></div><div><label>Acceso requerido</label><select id="acceso_requerido"><option>No aplica</option><option>Llave administración</option><option>Acompañamiento vigilancia</option><option>Permiso del cliente</option><option>Escalera</option><option>Arnés / trabajo en altura</option><option>Ingreso restringido</option></select></div></div><label>Descripción interna</label><textarea id="descripcion_interna"></textarea></div>
<div id="externoBox" class="hidden"><div class="section">2. Ubicación externa</div><div class="row"><div><label>Elemento externo</label><select id="elemento_externo"><option></option><option>Poste</option><option>Cámara</option><option>Pedestal</option><option>Fachada</option><option>Canalización</option><option>Armario</option><option>Gabinete exterior</option><option>Reserva aérea</option><option>Reserva subterránea</option><option>Otro</option></select></div><div><label>ID elemento</label><input id="id_elemento_externo"></div></div><label>Referencia externa</label><textarea id="referencia_externa"></textarea></div>
<div class="section">3. Ruta y fusión</div><div class="row"><div><label>ID Cliente / Servicio</label><input id="id_cliente"></div><div><label>Código ruta / cambio</label><input id="codigo_ruta"></div></div><div class="row"><div><label>Nombre punto / caja / manga</label><input id="nombre_punto"></div><div><label>Sentido</label><select id="sentido"><option>Nodo → Cliente</option><option>Cliente → Nodo</option><option>Troncal</option><option>Distribución</option><option>Derivación</option></select></div></div><div class="row"><div><label>Cable entrada</label><input id="cable_entrada"></div><div><label>Cable salida</label><input id="cable_salida"></div></div><div class="row"><div><label>Tubo entrada</label><input id="tubo_entrada"></div><div><label>Hilo entrada</label><input id="hilo_entrada" type="number"></div></div><div class="row"><div><label>Tubo salida</label><input id="tubo_salida"></div><div><label>Hilo salida</label><input id="hilo_salida" type="number"></div></div><label>Observaciones</label><textarea id="observacion"></textarea>
<div class="section">4. Fotos obligatorias</div><div class="photoGrid"><div class="photoCard"><label>Foto 1 panorámica *</label><button class="blue" onclick="tomarFoto('foto1')">Tomar foto 1</button><input id="inputFoto1" type="file" accept="image/*" capture="environment" style="display:none"><img id="prevFoto1" class="preview"></div><div class="photoCard"><label>Foto 2 empalme y fusión *</label><button class="blue" onclick="tomarFoto('foto2')">Tomar foto 2</button><input id="inputFoto2" type="file" accept="image/*" capture="environment" style="display:none"><img id="prevFoto2" class="preview"></div></div><canvas id="canvas" style="display:none"></canvas><div class="row" style="margin-top:12px"><button class="gray" onclick="cerrarForm()">Cancelar</button><button onclick="guardarOffline()">Guardar offline</button></div>
</div></div></div>

<div class="overlay" id="regOverlay"><div class="modal"><div class="head"><h2>Registros offline</h2><button class="red" onclick="cerrarRegistros()">Cerrar</button></div><div class="body"><div class="row"><button class="orange" onclick="sincronizar()">Enviar pendientes</button><button class="gray" onclick="exportarJSON()">Exportar JSON</button></div><div class="row" style="margin-top:8px"><button class="red" onclick="limpiarTodo()">Limpiar todo local</button></div><div id="lista" style="margin-top:12px"></div></div></div></div>

<script>
const SUPABASE_URL='https://fovxevhlcjeccrldlqim.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJIUzI1NiIsInJlZiI6ImZvdnhldmhsY2plY2NybGRscWltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMjIwMDQsImV4cCI6MjA5NjY5ODAwNH0.jp6DvOUNc9UAMxB8H67l-Re18roi2XnpJyk_V57b6fw'.replace('JIUzI1Ni','JIUzI1Ni');
const N8N_WEBHOOK='https://ftth-n8n2.pzveh5.easypanel.host/webhook/8f61872c-0b38-4f7e-acea-b3a272cfcd52';
const db=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
let map,gpsMarker,fixedMarker,watchId=null,seguir=true,latSel=null,lngSel=null,precisionGps=null,foto1=null,foto2=null,markers={};
let registros=JSON.parse(localStorage.getItem('oym_empalmes_offline_v1')||'[]');
function v(id){return document.getElementById(id)?.value.trim()||''}function save(){localStorage.setItem('oym_empalmes_offline_v1',JSON.stringify(registros));status()}
function status(){let p=registros.filter(x=>x.sync_status!=='enviado').length,e=registros.filter(x=>x.sync_status==='enviado').length;document.getElementById('status').innerText=`Pendientes: ${p} · Enviados: ${e}`}
function init(){map=L.map('map').setView([4.142,-73.6266],16);let sat=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:22}).addTo(map);let osm=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:22});L.control.layers({'Satélite':sat,'Calles':osm}).addTo(map);map.on('move zoom moveend',center);center();pintar();status()}
function center(){let c=map.getCenter();document.getElementById('centerInfo').innerHTML=`<b>Mira central:</b> ${c.lat.toFixed(7)}, ${c.lng.toFixed(7)}<br>Centra el empalme y presiona <b>Marcar</b>`}
function gpsIcon(){return L.divIcon({html:'<div class="gpsPulse"></div>',className:'',iconSize:[24,24],iconAnchor:[12,12]})}
function iniciarGPS(){if(!navigator.geolocation){alert('GPS no soportado');return}if(watchId!==null){seguir=true;return}watchId=navigator.geolocation.watchPosition(p=>{let lat=p.coords.latitude,lng=p.coords.longitude;precisionGps=Math.round(p.coords.accuracy);if(!gpsMarker)gpsMarker=L.marker([lat,lng],{icon:gpsIcon()}).addTo(map);else gpsMarker.setLatLng([lat,lng]);gpsMarker.bindPopup(`GPS tiempo real<br>Precisión ${precisionGps} m`);if(seguir)map.setView([lat,lng],Math.max(map.getZoom(),19));},e=>alert('Error GPS: '+e.message),{enableHighAccuracy:true,timeout:12000,maximumAge:0})}
function marcarCentro(){let c=map.getCenter();latSel=c.lat;lngSel=c.lng;if(fixedMarker)map.removeLayer(fixedMarker);fixedMarker=L.marker([latSel,lngSel]).addTo(map).bindPopup('Empalme fijado').openPopup();document.getElementById('gpsForm').innerHTML=`<b>Coordenada:</b> ${latSel.toFixed(7)}, ${lngSel.toFixed(7)}<br><b>Fecha:</b> ${new Date().toLocaleString()}`;document.getElementById('formOverlay').style.display='block'}
function cerrarForm(){document.getElementById('formOverlay').style.display='none'}function abrirRegistros(){pintar();document.getElementById('regOverlay').style.display='block'}function cerrarRegistros(){document.getElementById('regOverlay').style.display='none'}
function ambienteChange(){let a=v('ambiente');document.getElementById('internoBox').classList.toggle('hidden',a!=='interno');document.getElementById('externoBox').classList.toggle('hidden',a!=='externo')}
function tomarFoto(t){if(!latSel){alert('Primero marca el empalme');return}document.getElementById(t==='foto1'?'inputFoto1':'inputFoto2').click()}
document.getElementById('inputFoto1').addEventListener('change',e=>procFoto(e,'foto1'));document.getElementById('inputFoto2').addEventListener('change',e=>procFoto(e,'foto2'));
function procFoto(e,tipo){let file=e.target.files[0];if(!file)return;let rd=new FileReader();rd.onload=ev=>{let img=new Image();img.onload=()=>{let cv=document.getElementById('canvas'),ctx=cv.getContext('2d'),sc=Math.min(1,1280/img.width);cv.width=img.width*sc;cv.height=img.height*sc;ctx.drawImage(img,0,0,cv.width,cv.height);let titulo=tipo==='foto1'?'FOTO 1 PANORÁMICA':'FOTO 2 EMPALME Y FUSIÓN';let lineas=[titulo,`Punto: ${v('nombre_punto')||'Sin nombre'} (${v('ambiente')||'N/A'})`,`Fusión: Hilo ${v('hilo_entrada')||'N/A'} → Hilo ${v('hilo_salida')||'N/A'}`,`GPS: ${latSel.toFixed(7)}, ${lngSel.toFixed(7)}`,`Fecha: ${new Date().toLocaleString()}`];ctx.fillStyle='rgba(0,0,0,.76)';ctx.fillRect(0,cv.height-135,cv.width,135);ctx.fillStyle='#fff';ctx.font=`${Math.max(16,cv.width/50)}px Arial`;lineas.forEach((l,i)=>ctx.fillText(l,18,cv.height-108+i*22));let data=cv.toDataURL('image/jpeg',.86);if(tipo==='foto1'){foto1=data;prevFoto1.src=data;prevFoto1.style.display='block'}else{foto2=data;prevFoto2.src=data;prevFoto2.style.display='block'}};img.src=ev.target.result};rd.readAsDataURL(file)}
function guardarOffline(){if(!v('ambiente'))return alert('Selecciona interno o externo');if(!foto1)return alert('Foto 1 panorámica obligatoria');if(!foto2)return alert('Foto 2 empalme y fusión obligatoria');let r={offline_id:crypto.randomUUID(),sync_status:'pendiente',error_sync:null,fecha_captura_app:new Date().toISOString(),ambiente:v('ambiente'),tipo_punto:v('tipo_punto'),latitud:latSel,longitud:lngSel,precision_gps:precisionGps,zona_interna:v('zona_interna'),piso_nivel:v('piso_nivel'),torre_bloque:v('torre_bloque'),cuarto_rack:v('cuarto_rack'),referencia_visual:v('referencia_visual'),acceso_requerido:v('acceso_requerido'),descripcion_interna:v('descripcion_interna'),elemento_externo:v('elemento_externo'),id_elemento_externo:v('id_elemento_externo'),referencia_externa:v('referencia_externa'),id_cliente:v('id_cliente'),codigo_ruta:v('codigo_ruta'),nombre_punto:v('nombre_punto')||'Punto sin nombre',sentido:v('sentido'),cable_entrada:v('cable_entrada'),cable_salida:v('cable_salida'),tubo_entrada:v('tubo_entrada'),hilo_entrada:v('hilo_entrada')?Number(v('hilo_entrada')):null,tubo_salida:v('tubo_salida'),hilo_salida:v('hilo_salida')?Number(v('hilo_salida')):null,observacion:v('observacion'),foto1_base64:foto1,foto2_base64:foto2,foto1_panoramica_url:null,foto2_empalme_fusion_url:null,user_agent:navigator.userAgent};registros.unshift(r);save();limpiarForm();cerrarForm();pintar();alert('Guardado offline. Usa Enviar datos cuando tengas conexión.')}
function limpiarForm(){document.querySelectorAll('#formOverlay input:not([type=file]),#formOverlay textarea').forEach(x=>x.value='');document.querySelectorAll('#formOverlay select').forEach(x=>x.selectedIndex=0);foto1=foto2=null;prevFoto1.style.display='none';prevFoto2.style.display='none';ambienteChange()}
async function sincronizar(){let pend=registros.filter(r=>r.sync_status!=='enviado');if(!pend.length)return alert('No hay pendientes');for(let r of pend){try{r.sync_status='enviando';save();pintar();let fotos=await enviarFotos(r);r.foto1_panoramica_url=fotos.foto1_url||fotos.foto1_panoramica_url||fotos.url_foto1||null;r.foto2_empalme_fusion_url=fotos.foto2_url||fotos.foto2_empalme_fusion_url||fotos.url_foto2||null;let payload={...r,fecha_envio_app:new Date().toISOString(),dispositivo:'HTML_OFFLINE'};delete payload.sync_status;delete payload.error_sync;delete payload.foto1_base64;delete payload.foto2_base64;const {data,error}=await db.from('empalmes_enrutamiento').upsert(payload,{onConflict:'offline_id'}).select().single();if(error)throw error;await db.from('empalmes_enrutamiento_fotos').insert([{empalme_id:data.id,tipo_foto:'foto1_panoramica',url_foto:r.foto1_panoramica_url,nombre_archivo:`${r.offline_id}_foto1.jpg`,latitud:r.latitud,longitud:r.longitud,etiqueta:'Foto panorámica',respuesta_n8n:fotos},{empalme_id:data.id,tipo_foto:'foto2_empalme_fusion',url_foto:r.foto2_empalme_fusion_url,nombre_archivo:`${r.offline_id}_foto2.jpg`,latitud:r.latitud,longitud:r.longitud,etiqueta:'Foto empalme y fusión',respuesta_n8n:fotos}]);r.sync_status='enviado';r.supabase_id=data.id;r.error_sync=null;save()}catch(e){r.sync_status='error';r.error_sync=e.message||String(e);save();console.error(e)}}pintar();alert('Envío finalizado. Revisa registros.')}
async function enviarFotos(r){let resp=await fetch(N8N_WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({offline_id:r.offline_id,id_cliente:r.id_cliente,codigo_ruta:r.codigo_ruta,nombre_punto:r.nombre_punto,latitud:r.latitud,longitud:r.longitud,foto1_nombre_archivo:`${r.offline_id}_foto1_panoramica.jpg`,foto2_nombre_archivo:`${r.offline_id}_foto2_empalme_fusion.jpg`,foto1_panoramica_base64:r.foto1_base64,foto2_empalme_fusion_base64:r.foto2_base64,metadata:r})});if(!resp.ok)throw new Error('n8n HTTP '+resp.status);let txt=await resp.text();try{return txt?JSON.parse(txt):{}}catch{return {respuesta_texto:txt}}}
function pintar(){Object.values(markers).forEach(m=>map.removeLayer(m));markers={};registros.forEach(r=>{let col=r.sync_status==='enviado'?'#16a34a':r.sync_status==='error'?'#dc2626':(r.ambiente==='interno'?'#7c3aed':'#0284c7');let m=L.circleMarker([r.latitud,r.longitud],{radius:10,color:'#fff',weight:2,fillColor:col,fillOpacity:.95}).addTo(map);m.bindPopup(`<b>${r.nombre_punto}</b><br>Sync: ${r.sync_status}<br>Cliente: ${r.id_cliente||'N/A'}<br>Hilo ${r.hilo_entrada||'N/A'} → ${r.hilo_salida||'N/A'}<br><button onclick="eliminar('${r.offline_id}')" style="background:#ef4444;color:white;margin-top:8px">Eliminar</button>`);markers[r.offline_id]=m});let lista=document.getElementById('lista');if(!lista)return;if(!registros.length){lista.innerHTML='<div class="gpsBox">Sin registros.</div>';return}lista.innerHTML=registros.map(r=>`<div class="item"><span class="badge ${r.ambiente}">${(r.ambiente||'N/A').toUpperCase()}</span><span class="badge ${r.sync_status==='enviado'?'enviado':r.sync_status==='error'?'error':'pendiente'}">${r.sync_status.toUpperCase()}</span><br><b>${r.nombre_punto}</b><br>Cliente: ${r.id_cliente||'N/A'} · Ruta: ${r.codigo_ruta||'N/A'}<br>Fusión: tubo ${r.tubo_entrada||'N/A'} hilo ${r.hilo_entrada||'N/A'} → tubo ${r.tubo_salida||'N/A'} hilo ${r.hilo_salida||'N/A'}<br>GPS: ${Number(r.latitud).toFixed(7)}, ${Number(r.longitud).toFixed(7)}<br>${r.error_sync?'<b style="color:#f87171">Error:</b> '+r.error_sync+'<br>':''}<img class="mini" src="${r.foto1_base64}"> <img class="mini" src="${r.foto2_base64}"><div class="row"><button class="blue" onclick="ver('${r.offline_id}')">Ver mapa</button><button class="red" onclick="eliminar('${r.offline_id}')">Eliminar</button></div></div>`).join('');status()}
function ver(id){let r=registros.find(x=>x.offline_id===id);if(!r)return;cerrarRegistros();map.setView([r.latitud,r.longitud],20);setTimeout(()=>markers[id]?.openPopup(),300)}function eliminar(id){let r=registros.find(x=>x.offline_id===id);if(r?.sync_status==='enviado'){if(!confirm('Ya fue enviado. Se eliminará solo del celular.'))return}else if(!confirm('¿Eliminar empalme local?'))return;registros=registros.filter(x=>x.offline_id!==id);save();pintar()}function exportarJSON(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(registros,null,2)],{type:'application/json'}));a.download='empalmes_offline.json';a.click()}function limpiarTodo(){if(confirm('¿Borrar todo lo local?')){registros=[];save();pintar()}}
init();
</script>
</body>
</html>
